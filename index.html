<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css">
</head>

<body>
    <div class="bg-white">
        <div class="max-w-[1280px] m-auto px-[15px] md:px-[40px]">
            <header class="flex items-center justify-around bg-[red] py-[20px] md:py-[30px]">
                <button
                    class="bg-[white] text-white px-[25px] py-[8px] md:px-[30px] md:py-[10px] rounded-[30px] text-[14px] md:text-[16px]">
                    Login
                </button>
                <nav class="hidden md:flex gap-[30px]">
                    <p class="text-[16px] text-gray-700">Booking</p>
                    <p class="text-[16px] text-gray-700">Facilities</p>
                    <p class="text-[16px] text-gray-700">About Us</p>
                    <p class="text-[16px] text-gray-700">Location</p>
                    <p class="text-[16px] text-gray-700">Contact</p>
                </nav>

                <div class="md:hidden font-bold text-[#27ae60]">TravelCo</div>

                <button
                    class="bg-[#27ae60] text-white px-[25px] py-[8px] md:px-[30px] md:py-[10px] rounded-[30px] text-[14px] md:text-[16px]">
                    Login
                </button>
            </header>

            <section class="pb-[50px] md:pb-[100px]">
                <div
                    class="bg-[#f2f9f6] lg:h-[656px] rounded-[30px] md:rounded-[30px] flex flex-col md:flex-row overflow-hidden relative">

                    <div class="w-full md:w-[50%] p-[30px] md:p-[80px] z-10">
                        <h1 class="text-[64px] md:text-[56px] font-medium mb-[15px] md:mb-[25px]">
                            Find your perfect place to stay
                        </h1>
                        <p class="text-gray-500 text-[14px] md:text-[18px] mb-[25px] md:mb-[40px] max-w-[400px]">
                            Lorem Ipsum is simply dummy text of the printing and typesetting industry.
                        </p>

                        <div class="flex items-center gap-[12px] md:gap-[15px]">
                            <div class="w-[40px] h-[40px] md:w-[50px] md:h-[50px] flex items-center justify-center">
                                <img src="./img/Layer 2 (1).png" alt="">
                            </div>
                            <span class="text-[14px] md:text-[16px]">Watch video</span>
                        </div>
                    </div>

                    <div class="w-full md:w-[50%] h-[250px] md:h-auto">
                        <img src="./img/9949b2b92ef4c63cc808930493872586a74af1c5.jpg" alt="Stay Place"
                            class="w-full h-full object-cover" />
                    </div>

                    <div
                        class="static md:absolute md:top-[520px] md:left-[50%] md:translate-x-[-50%] bg-white m-[20px] md:m-0 p-[10px] md:p-[15px] rounded-[20px] md:rounded-[60px] shadow-xl flex flex-col md:flex-row items-center w-[calc(100%-40px)] md:w-[90%] max-w-[850px]">
                        <div
                            class="flex items-center gap-[10px] px-[15px] py-[10px] md:py-0 border-b md:border-b-0 md:border-r border-gray-100 w-full md:w-1/4">
                            <div><img src="./img/Layer 2 (2).png" alt=""></div>
                            <div>
                                <p class="text-[12px] md:text-[14px] font-medium">Location</p>
                                <p class="text-[11px] md:text-[12px] text-[gray]">United States</p>
                            </div>
                        </div>

                        <div class="flex items-center gap-[10px] px-[15px] py-[10px] md:py-0 border-b border-gray-100 w-full md:w-1/4">
                            <div><img src="./img/Layer 2 (3).png" alt=""></div>
                            <div>
                                <p class="text-[12px] md:text-[14px] font-medium">Check in</p>
                                <p class="text-[11px] md:text-[12px] text-[gray]">10 Jun 2021</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-[10px] px-[15px] py-[10px] md:py-0 border-b md:border-b-0 md:border-r border-gray-100 w-full md:w-1/4">
                            <div><img src="./img/Layer 2 (3).png" alt=""></div>
                            <div>
                                <p class="text-[12px] md:text-[14px] font-medium">Check out</p>
                                <p class="text-[11px] md:text-[12px] text-[gray]">15 Jun 2021</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-[10px] px-[15px] py-[10px] md:py-0 w-full md:w-1/4">
                            <div><img src="./img/person 1.png" alt=""></div>
                            <div>
                                <p class="text-[12px] md:text-[14px] font-medium">Rooms for</p>
                                <p class="text-[11px] md:text-[12px] text-[gray]">1 room, 2 guests</p>
                            </div>
                        </div>
                        <button class="bg-[#24AB70] text-white w-[200px] md:w-auto md:mt-0 px-[35px] py-[15px] md:py-[18px] rounded-[15px] md:rounded-[40px] flex items-center justify-center gap-[10px]">
                            <div><img class="w-[50px] h-[25px] bg-amber-600" src="./img/search-outline 1.png" alt=""></div>
                            <span class="text-[18px] md:text-[16px] bg-amber-300">Search...</span>
                        </button>
                    </div>
                </div>
            </section>
        </div>
    </div>

</body>

</html>
